# Docker Compose + Doppler
#
# `environment` uses ${VAR} so Compose substitutes from:
#   • Your shell (e.g. secrets injected by `doppler run`), or
#   • Repo-root `.env` (Compose loads it automatically for substitution — gitignored).
#
# Recommended invocations:
#   doppler run -- docker compose up --pull always
#   ./scripts/docker_compose_up.sh   # wraps the same (or ./docker_compose_up.sh if copied to repo root)
#
# Passing only `DOPPLER_TOKEN=… docker compose up` does NOT set DATABASE_URL etc.
# Use `doppler run` or write `.env` first — see:
# https://docs.doppler.com/docs/docker-compose#option-2-container-env-vars
#
# Optional music folder slash commands (`MUSIC_FOLDER_1` … `25`, `music.py`): Compose only forwards env keys
# listed under services.bot.environment. This file wires the first three slots; duplicate the pattern for 4–25.
#
services:
  bot:
    image: ghcr.io/jj3571/discord-bot:latest
    # Lavalink starts first; bot does not wait for Lavalink.health (curl/JVM quirks can strand the bot as "waiting").
    # Use MUSIC_LAVALINK_POOL_CONNECTED_TIMEOUT_SEC in music cog for websocket readiness instead.
    depends_on:
      lavalink:
        condition: service_started
    networks:
      - discord_bot_net
    volumes:
      # Local audio assets (music, brainrot sfx) — bind mount so changes
      # are reflected without rebuilding.
      - ./local_audio:/app/local_audio:ro
      # Persisted data (tierlist images, etc.). These survive image rebuilds.
      - tierlist_data:/app/data
      # Legacy SQLite dbs (economy.db, waterboard.db, etc.) if using local DB.
      - db_data:/app/databases
      # Combined runtime log (``main_bot`` + Nextcord); inspect on host under ``./logs``.
      - ./logs:/app/logs
    restart: unless-stopped
    environment:
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      AFK_CHANNEL_ID: ${AFK_CHANNEL_ID}
      APPLICATION_ID: ${APPLICATION_ID}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_LOG_STDOUT_MIRROR: ${APP_LOG_STDOUT_MIRROR:-true}
      BACKUP_CHANNEL_ID: ${BACKUP_CHANNEL_ID}
      BOT_LOG_BACKUP_COUNT: ${BOT_LOG_BACKUP_COUNT:-5}
      BOT_LOG_FILE: ${BOT_LOG_FILE:-/app/logs/discord_bot.log}
      BOT_LOG_MAX_BYTES: ${BOT_LOG_MAX_BYTES:-10485760}
      BOT_LOG_JOURNAL_EXTRA_UNITS: ${BOT_LOG_JOURNAL_EXTRA_UNITS}
      BOT_LOG_JOURNAL_UNIT: ${BOT_LOG_JOURNAL_UNIT}
      BOT_SPAM_ID: ${BOT_SPAM_ID}
      BRAVE_IMAGE_SEARCH_MIN_INTERVAL: ${BRAVE_IMAGE_SEARCH_MIN_INTERVAL}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY}
      BRAVE_TIERLIST_IMAGE_MIN_HEIGHT: ${BRAVE_TIERLIST_IMAGE_MIN_HEIGHT}
      BRAVE_TIERLIST_IMAGE_MIN_WIDTH: ${BRAVE_TIERLIST_IMAGE_MIN_WIDTH}
      BIRTHDAY_ANNOUNCEMENT_CHANNEL_ID: ${BIRTHDAY_ANNOUNCEMENT_CHANNEL_ID}
      BIRTHDAY_CHANNEL_ID: ${BIRTHDAY_CHANNEL_ID}
      BIRTHDAY_EMOJI_ID: ${BIRTHDAY_EMOJI_ID}
      BIRTHDAY_REACTION_CHANNEL_ID: ${BIRTHDAY_REACTION_CHANNEL_ID}
      BIRTHDAY_ROLE_ID: ${BIRTHDAY_ROLE_ID}
      CHARACTER_AVATARS: ${CHARACTER_AVATARS}
      COIN_EMOJI_ID: ${COIN_EMOJI_ID}
      COMMUNITY_NOTES_REACTION_EMOJI: ${COMMUNITY_NOTES_REACTION_EMOJI}
      CRAFTY_BASE_URL: ${CRAFTY_BASE_URL}
      CRAFTY_PASSWORD: ${CRAFTY_PASSWORD}
      CRAFTY_USERNAME: ${CRAFTY_USERNAME}
      CREATE_FIRETEAM_CHANNEL_ID: ${CREATE_FIRETEAM_CHANNEL_ID}
      DATABASE_URL: ${DATABASE_URL}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      ENVIRONMENT: ${ENVIRONMENT}
      ERROR_ALERT_CHANNEL_ID: ${ERROR_ALERT_CHANNEL_ID}
      ERROR_ALERT_USER_ID: ${ERROR_ALERT_USER_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GUILD_ID: ${GUILD_ID}
      HEADS_EMOJI_ID: ${HEADS_EMOJI_ID}
      HIDDEN_CATEGORY_ID: ${HIDDEN_CATEGORY_ID}
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD}
      # Lavalink WS/HTTP as seen FROM THE BOT CONTAINER. Do NOT use localhost/127.0.0.1 here:
      # that points at the bot container itself when running in Docker, so Wavelink never connects.
      # Default is Compose DNS hostname `lavalink` on the shared Docker network below.
      # Host/Doppler LAVALINK_URI (often localhost for laptop dev) is intentionally NOT plumbed here
      # unless you pass LAVALINK_DOCKER_URI to override — e.g. external Lavalink: http://other:2333
      LAVALINK_URI: ${LAVALINK_DOCKER_URI:-http://lavalink:2333}
      LEAGUE_CHANNEL_ID: ${LEAGUE_CHANNEL_ID}
      LOAD_DEVELOPMENT_COGS: ${LOAD_DEVELOPMENT_COGS}
      FULL_DEBUG_IN_TERMINAL: ${FULL_DEBUG_IN_TERMINAL}
      NEXTCORD_FILE_LOG_LEVEL: ${NEXTCORD_FILE_LOG_LEVEL:-INFO}
      MANA_SYMBOLS: ${MANA_SYMBOLS}
      MTG_AUTOLINK_BLOCKED_NAMES: ${MTG_AUTOLINK_BLOCKED_NAMES}
      MTG_AUTOLINK_CHANNEL_IDS: ${MTG_AUTOLINK_CHANNEL_IDS}
      MTG_AUTOLINK_COOLDOWN_CHANNEL_IDS: ${MTG_AUTOLINK_COOLDOWN_CHANNEL_IDS}
      MTG_AUTOLINK_MAX_CARDS_PER_MESSAGE: ${MTG_AUTOLINK_MAX_CARDS_PER_MESSAGE}
      MTG_AUTOLINK_MAX_WORD_SPAN: ${MTG_AUTOLINK_MAX_WORD_SPAN}
      MUSIC_LOCAL_HTTP_HOST: ${MUSIC_LOCAL_HTTP_HOST:-bot}
      MUSIC_LOCAL_HTTP_BIND_HOST: ${MUSIC_LOCAL_HTTP_BIND_HOST:-0.0.0.0}
      MUSIC_LOCAL_HTTP_PORT: ${MUSIC_LOCAL_HTTP_PORT:-8765}
      MUSIC_VOICE_CHANNEL_DENYLIST: ${MUSIC_VOICE_CHANNEL_DENYLIST}
      # ------------------------ Music slash commands /<folder> → local_audio/music/<folder>/ 
      # (slots 4–25: copy these two lines for each additional folder, bump n):
      #   MUSIC_FOLDER_4: ${MUSIC_FOLDER_4:-}
      #   MUSIC_4_SHUFFLE_START: ${MUSIC_4_SHUFFLE_START:-}
      MUSIC_FOLDER_1: ${MUSIC_FOLDER_1:-}
      MUSIC_FOLDER_2: ${MUSIC_FOLDER_2:-}
      MUSIC_FOLDER_3: ${MUSIC_FOLDER_3:-}
      MUSIC_1_SHUFFLE_START: ${MUSIC_1_SHUFFLE_START:-}
      MUSIC_2_SHUFFLE_START: ${MUSIC_2_SHUFFLE_START:-}
      MUSIC_3_SHUFFLE_START: ${MUSIC_3_SHUFFLE_START:-}
      # ------------------------
      OMDB_API_KEY: ${OMDB_API_KEY}
      OMDB_API_URL: ${OMDB_API_URL}
      SEEN_CATEGORY_ID: ${SEEN_CATEGORY_ID}
      TAILS_EMOJI_ID: ${TAILS_EMOJI_ID}
      VOICE_CHANNEL_IDS: ${VOICE_CHANNEL_IDS}
      WATCH_PARTY_CHANNEL_ID: ${WATCH_PARTY_CHANNEL_ID}
      WATCH_PARTY_EVENT_ID: ${WATCH_PARTY_EVENT_ID}
      WATERBOARD_CATEGORY_ID: ${WATERBOARD_CATEGORY_ID}
      WEBHOOK_URL: ${WEBHOOK_URL}
      ZERONI_REACTION_EMOJI: ${ZERONI_REACTION_EMOJI}
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  lavalink:
    # Pre-built official image. Mount your application.yml to override defaults
    # (password, plugins, YouTube OAuth, etc.).
    image: ghcr.io/lavalink-devs/lavalink:latest
    networks:
      - discord_bot_net
    environment:
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD}
      # youtube-source OAuth (see lavalink/application.yml placeholders; Lavalink docs env override: PLUGINS_YOUTUBE_OAUTH_*).
      - YOUTUBE_OAUTH_ENABLED=${YOUTUBE_OAUTH_ENABLED:-false}
      - YOUTUBE_OAUTH_REFRESH_TOKEN=${YOUTUBE_OAUTH_REFRESH_TOKEN:-}
    volumes:
      # Official image reads config here — https://lavalink.dev/getting-started/docker
      # (mounting elsewhere ignores your YAML; bot then probes wrong port → lavalink_http_probe_failed).
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
      # application.yml sets ``logging.file.name`` to ``./logs/lavalink.log`` → under ``/opt/Lavalink/logs`` in the image.
      # Same host ``./logs`` as the bot so ``discord_bot.log`` and ``lavalink.log`` sit together (gitignored). Without this
      # mount, use ``docker compose logs lavalink``.
      - ./logs:/opt/Lavalink/logs
    ports:
      - "127.0.0.1:2333:2333"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2333/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  # Named volumes survive container rebuilds — only image changes, data persists.
  tierlist_data:
  db_data:

networks:
  # Explicit bridge so bot resolves `lavalink` via Compose DNS over the internal net (see LAVALINK_URI above).
  discord_bot_net:
    driver: bridge
