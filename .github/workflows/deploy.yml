name: Deploy

# Triggered manually (workflow_dispatch) or after Release completes (workflow_run).
# Expects `docker-compose.yml` (or `compose.yaml`) under DEPLOY_COMPOSE_DIR on the VPS.
on:
  workflow_dispatch:
  workflow_run:
    workflows: [.github/workflows/release.yml]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    # Only run if the Release workflow succeeded (when triggered via workflow_run).
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Optional repo variable: absolute path to the compose project on the VPS.
          # Defaults to /home/discord_bot when unset or empty.
          DEPLOY_COMPOSE_DIR: ${{ vars.DEPLOY_COMPOSE_DIR }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          envs: DEPLOY_COMPOSE_DIR
          script_stop: true
          script: |
            set -euo pipefail

            # Ensure strict ssh key permissions (defensive)
            if [ -d /home/discord_bot/.ssh ]; then
              chmod -R 700 /home/discord_bot/.ssh 2>/dev/null || true
              chmod 600 /home/discord_bot/.ssh/github_discord_bot 2>/dev/null || true
            fi

            DEPLOY_DIR="${DEPLOY_COMPOSE_DIR:-/home/discord_bot}"
            cd "$DEPLOY_DIR"

            if [ ! -f docker-compose.yml ] && [ ! -f compose.yaml ]; then
              echo "No Compose file in ${DEPLOY_DIR}."
              echo "Set GitHub repo variable DEPLOY_COMPOSE_DIR to the directory that contains docker-compose.yml."
              ls -la
              exit 1
            fi

            docker compose down
            doppler run -- docker compose up -d --pull always
