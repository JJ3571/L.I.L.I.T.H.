name: CI/CD Pipeline 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Map the secret to an ENV variable here so the steps can see it
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      DISCORD_BOT_TOKEN: ci-placeholder-token
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Install Doppler CLI
        # Now we check 'env' instead of 'secrets'
        if: env.DOPPLER_TOKEN != ''
        run: curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sudo sh

      - name: Run tests
        if: env.DOPPLER_TOKEN != ''
        run: doppler run -- uv run pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # JOB-LEVEL IF: We cannot check secrets here.
    # Instead, we check if the event is a 'push' to 'main'.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      # v1.2.x supports `fingerprint` (SHA256 of droplet host key), not `known_hosts`.
      # Add secret SSH_HOST_FINGERPRINT only if you want strict host pinning; omit otherwise.
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            GIT_SSH='ssh -o StrictHostKeyChecking=accept-new'
            cd /home/discord_bot_v2
            sudo -u discord_bot env GIT_SSH_COMMAND="$GIT_SSH" git fetch origin
            sudo -u discord_bot env GIT_SSH_COMMAND="$GIT_SSH" git reset --hard origin/main
            sudo -i -u discord_bot bash -c 'cd /home/discord_bot_v2 && /home/discord_bot/.local/bin/uv sync --no-dev'
            systemctl restart discord_bot_v2