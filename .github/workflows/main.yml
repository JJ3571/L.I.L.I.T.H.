name: CI/CD Pipeline 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      DISCORD_BOT_TOKEN: ci-placeholder-token
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # JOB-LEVEL IF: We cannot check secrets here.
    # Instead, we check if the event is a 'push' to 'main'.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      # v1.2.x supports `fingerprint` (SHA256 of droplet host key), not `known_hosts`.
      # Add secret SSH_HOST_FINGERPRINT only if you want strict host pinning; omit otherwise.
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            GIT_SSH='ssh -o StrictHostKeyChecking=accept-new'
            # Ensure SSH key material has strict permissions before git uses it.
            chown -R discord_bot:discord_bot /home/discord_bot/.ssh
            chmod 750 /home/discord_bot
            chmod 700 /home/discord_bot/.ssh
            chmod 600 /home/discord_bot/.ssh/config
            chmod 600 /home/discord_bot/.ssh/github_discord_bot
            chmod 644 /home/discord_bot/.ssh/github_discord_bot.pub
            chmod 600 /home/discord_bot/.ssh/known_hosts*
            cd /home/discord_bot_v2
            sudo -u discord_bot env GIT_SSH_COMMAND="$GIT_SSH" git fetch origin
            sudo -u discord_bot env GIT_SSH_COMMAND="$GIT_SSH" git reset --hard origin/main
            sudo -i -u discord_bot bash -c 'cd /home/discord_bot_v2 && /home/discord_bot/.local/bin/uv sync --no-dev'
            systemctl restart discord_bot_v2