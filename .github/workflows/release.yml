name: Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+    # v1.2.3
      - v[0-9]+.[0-9]+.[0-9]+-* # v1.2.3-beta, v1.2.3+build123

permissions:
  contents: write   # needed to create GitHub releases
  packages: write   # needed to push to GHCR

jobs:
  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up QEMU (cross-build arm64 on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: JJ3571
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jj3571/discord-bot:${{ steps.version.outputs.version }}
            ghcr.io/jj3571/discord-bot:latest

      # Standalone ZIP is attached by `.github/workflows/release-standalone-bundle.yml`
      # via `workflow_run` (release events from GITHUB_TOKEN do not start workflows).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}