name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DISCORD_BOT_TOKEN: ci-placeholder-token
      GUILD_ID: "0"
      APPLICATION_ID: "0"
      DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
      DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (including dev)
        run: uv sync --group dev

      - name: Install Doppler CLI
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        run: curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sudo sh

      - name: Run tests (Doppler)
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- uv run pytest

      - name: Run tests (env placeholders)
        if: ${{ secrets.DOPPLER_TOKEN == '' }}
        run: uv run pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.SSH_PRIVATE_KEY != '' &&
      secrets.SSH_HOST != '' &&
      secrets.SSH_USER != '' &&
      secrets.SSH_KNOWN_HOSTS != '' &&
      vars.DEPLOY_PATH != '' &&
      vars.SYSTEMD_SERVICE != ''
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      SYSTEMD_SERVICE: ${{ vars.SYSTEMD_SERVICE }}
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          envs: DEPLOY_PATH,SYSTEMD_SERVICE
          script_stop: true
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"
            command -v uv >/dev/null || { echo "uv not found; install https://docs.astral.sh/uv/"; exit 1; }
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            uv sync --frozen
            sudo systemctl restart "$SYSTEMD_SERVICE"
