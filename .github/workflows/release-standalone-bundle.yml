name: Release standalone bundle

# Runs when a release is published outside tag CI (e.g. GitHub UI). Releases
# created by `.github/workflows/release.yml` use GITHUB_TOKEN — those do NOT
# fire `release` workflow triggers; that workflow attaches the ZIP itself.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build discord-bot-standalone.zip
        run: chmod +x scripts/build_deploy_bundle.sh && ./scripts/build_deploy_bundle.sh

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/discord-bot-standalone.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
