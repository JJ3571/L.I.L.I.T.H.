name: Release standalone bundle

# Attach discord-bot-standalone.zip to a GitHub Release and append a copy-paste curl
# one-liner to the release notes (append_body). Re-running for the same tag may duplicate that blurb.
#
# - Tag releases from CI: `release` events from GITHUB_TOKEN do not start workflows,
#   so this workflow runs when the `Release` workflow completes (`workflow_run`).
#   The `workflows` filter must be the workflow `name:` (Release), not the file path.
# - Releases published outside that path (e.g. GitHub UI): `release` still triggers this.
# - Manual: Actions → this workflow → Run workflow (required tag, e.g. v0.4.1).
on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag for the existing GitHub Release (e.g. v0.2.1).
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundle:
    name: Build standalone bundle
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout (after Release workflow)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag (after Release workflow)
        id: tag_wr
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "Expected an annotated/lightweight tag on the Release workflow commit."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout (release published)
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Checkout (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0

      - name: Export release tag for upload
        id: pick
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = workflow_run ]; then
            echo "tag=${{ steps.tag_wr.outputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = release ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build discord-bot-standalone.zip
        run: chmod +x scripts/build_deploy_bundle.sh && ./scripts/build_deploy_bundle.sh

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pick.outputs.tag }}
          files: dist/discord-bot-standalone.zip
          fail_on_unmatched_files: true
          append_body: true
          body: |
            ### Standalone bundle (VPS)

            ```bash
            curl -fLO "https://github.com/${{ github.repository }}/releases/download/${{ steps.pick.outputs.tag }}/discord-bot-standalone.zip"
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
